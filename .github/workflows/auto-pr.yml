name: Auto PR to dev

on:
  push:
    branches:
      - feat/**
      - fix/**
      - chore/**
      - refactor/**
      - docs/**

jobs:
  create-pr:
    name: Create PR to dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a PR already exists for this branch
          existing=$(gh pr list --head "${{ github.ref_name }}" --base dev --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #$existing already exists for ${{ github.ref_name }} → dev"
            exit 0
          fi

          gh pr create \
            --base dev \
            --head "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --body "Auto-generated PR for \`${{ github.ref_name }}\`.

          Triggered by push from @${{ github.actor }}."
