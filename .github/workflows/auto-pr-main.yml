name: Auto PR to main

on:
  push:
    branches:
      - dev

jobs:
  create-pr:
    name: Create PR to main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Create or update Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a PR already exists for dev → main
          existing=$(gh pr list --head dev --base main --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #$existing already exists for dev → main"
            exit 0
          fi

          gh pr create \
            --base main \
            --head dev \
            --title "Release: dev → main" \
            --body "Auto-generated PR to promote \`dev\` into \`main\`.

          Merge when ready to release to production."
